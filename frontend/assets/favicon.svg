<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Connections -->
  <g stroke="url(#grad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
    <line x1="18" y1="48" x2="32" y2="16"/>
    <line x1="32" y1="16" x2="46" y2="48"/>
    <line x1="24" y1="34" x2="40" y2="34"/>
  </g>

  <!-- Nodes -->
  <g fill="url(#grad)">
    <circle cx="18" cy="48" r="4"/>
    <circle cx="32" cy="16" r="4"/>
    <circle cx="46" cy="48" r="4"/>
    <circle cx="24" cy="34" r="3.5"/>
    <circle cx="40" cy="34" r="3.5"/>
  </g>

</svg>